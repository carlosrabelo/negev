name: Release Negev Binaries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Aciona automaticamente em tags como v1.0.0
  workflow_dispatch: # Permite execução manual

jobs:
  build-and-release:
    name: Build and Release ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: negev-linux-amd64
            asset_name: negev-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: negev-windows-amd64.exe
            asset_name: negev-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Ajuste para sua versão do Go

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ${{ matrix.binary_name }} -v
        env:
          CGO_ENABLED: 0

      - name: Set tag for manual run
        if: github.event_name == 'workflow_dispatch'
        run: echo "TAG=manual-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Set tag for push event
        if: github.event_name == 'push'
        run: echo "TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.binary_name }}
          name: "Negev ${{ env.TAG }}"
          tag_name: ${{ env.TAG }}
          draft: ${{ github.event_name == 'workflow_dispatch' }} # Rascunho para manual, publicado para push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}