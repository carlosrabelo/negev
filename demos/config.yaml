platform: auto
transport: telnet
username: admin
password: cisco123
enable_password: cisco123
default_vlan: "1"
no_data_vlan: "999"
allowed_vlans:
  - "10"
  - "20"
  - "30"
  - "100"
  - "200"
  - "300"
protected_vlans:
  - "999"
mac_to_vlan:
  "aabbcc": "10"
  "112233": "20"
  "deadbe": "100"
exclude_macs:
  - "ffff.ffff.ffff"
  - "0000.0000.0000"

switches:
