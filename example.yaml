default_oui_mappings:
  - vlan: 10
    oui: ["00:50:56", "00:1A:11"]
  - vlan: 20
    oui: ["00:14:22"]
enable_access_portfast: true
null_vlan: 999
port_types:
  - "GigabitEthernet"
default_vlan: 1
username: global_admin
password: global_cisco
enable_password: global_cisco123
switches:
  - target: 192.168.1.1
    community: public
    trap_port: 162
    username: admin
    password: cisco
    enable_password: cisco123
    oui_mappings: [] # Usa default_oui_mappings
    ignored_ports:
      - "GigabitEthernet1/0/1"
      - "GigabitEthernet1/0/2"
    exclude_macs:
      - "00:11:22:33:44:55"
    create_vlans: true
  - target: 192.168.1.2
    community: public
    trap_port: 162
    oui_mappings:
      - vlan: 15
        oui: ["00:50:56"]
      - vlan: 25
        oui: ["00:1A:11"]
    ignored_ports:
      - "GigabitEthernet1/0/3"
      - "GigabitEthernet1/0/4"
    exclude_macs:
      - "00:66:77:88:99:AA"
    create_vlans: false