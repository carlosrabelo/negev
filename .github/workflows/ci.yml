name: CI

on:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: make quality
      - run: make build
      - run: make test
      - run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false
