    platform: ios
    transport: ssh
    username: switchadmin
    password: switchpass
    enable_password: enablepass
    mac_to_vlan:
      "001122": "30"
      "00": ""
    exclude_macs:
      - "aaaa.bbbb.cccc"

  - target: 192.168.1.20
    platform: auto
    default_vlan: "100"
    exclude_ports:
      - "Gi1/0/24"
      - "Gi1/0/23"
